<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>CSS Transition  Transform </title>

<style>
body {
  font-family: Arial;
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
  padding: 20px;
}
.box {
  width: 100px;
  height: 100px;
}
.rotate {
  background: teal;
  transition: transform 0.5s;
}
.rotate:hover {
  transform: rotate(90deg);
}

.move {
  background: orange;
  transition: transform 1s;
}
.move:hover {
  transform: translateX(150px);
}

.btn {
  height: 25px;
  width: 50px;
  /* padding: 10px 20px; */
  background: blue;
  color: white;
  border: none;
  border-top-left-radius: 5px;
  border-bottom-right-radius: 5px;
  transition: background 0.3s;
}
.btn:hover {
  background: red;
}

.scale {
  background: lightgreen;
  transition: transform 0.4s;
}
.scale:hover {
  transform: scale(1.2);
}

.shape {
  background: purple;
  transition: border-radius 0.5s;
}
.shape:hover {
  border-radius: 50%;
}

.img-box {
  width: 200px;
  overflow: hidden;
}
.img-box img {
  width: 100%;
  transition: transform 0.5s;
}
.img-box:hover img {
  transform: scale(1.2);
}

.nav {
  list-style: none;
  display: flex;
  gap: 10px;
}
.nav a {
  text-decoration: none;
  color: black;
  transition: color 0.3s;
}
.nav a:hover {
  color: red;
}

.product {
  width: 150px;
  height: 100px;
  background: white;
  border: 1px solid #ccc;
  transition: transform 0.3s, box-shadow 0.3s;
}
.product:hover {
  transform: translateY(-10px);
  box-shadow: 10px 20px rgba(0,0,0,0.3);
}

.spin {
  width: 100px;
  height: 100px;
  background: crimson;
  transition: transform 1s linear;
}

.spin:hover {
  transform: rotate(360deg);
}
@keyframes spin360 {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

.combo {
  background: gold;
  transition: transform 0.5s;
}
.combo:hover {
  transform: translateX(100px) rotate(45deg) scale(1.3);
}

</style>

</head>

<body>

<h2>CSS Effects Demo</h2>

<div class="box rotate"></div>
<div class="box move"></div>
<button class="btn">Click Me</button>
<div class="box scale"></div>
<div class="box shape"></div>

<div class="img-box">
  <img src="C:\Users\admin\Desktop\images\lavender-field-sunset-near-valensole_268835-3910 (1).avif">
</div>

<ul class="nav">
  <li><a href="#">Home</a></li>
  <li><a href="#">About</a></li>
  <li><a href="#">Contact</a></li>
</ul>

<div class="product"></div>
<div class="box spin"></div>
<div class="box combo"></div>

</body>
</html>
